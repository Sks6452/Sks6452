name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pacman
        uses: Platane/snk@v3
        with:
          github_user_name: Sks6452
          outputs: |
            dist/pacman-contribution-graph-dark.svg?palette=github-dark
            dist/pacman-contribution-graph.svg?palette=github

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
